<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      padding: 16px;
      margin: 0;
      color: #1a1a1a;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    #status {
      margin: 12px 0;
      padding: 8px;
      border-radius: 6px;
      background: #f5f5f5;
      font-size: 13px;
      min-height: 20px;
      white-space: pre-wrap;
    }
    #status.error { background: #fde8e8; color: #b91c1c; }
    #status.success { background: #e8fde8; color: #15803d; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #d1d5db; cursor: not-allowed; }
    #diagnostics {
      margin-top: 12px;
      font-size: 11px;
      color: #6b7280;
    }
    .not-on-fc {
      text-align: center;
      color: #6b7280;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>Farcaster Bookmarks</h1>
  <div id="content"></div>
  <script src="farcaster.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
