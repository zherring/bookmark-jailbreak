<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #111827;
      background: #f3f4f6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(243,244,246,0.92)),
        radial-gradient(circle at top left, rgba(209,213,219,0.35), transparent 48%);
      color: #111827;
      flex-shrink: 0;
      border-bottom: 1px solid #e5e7eb;
      backdrop-filter: blur(10px);
    }
    .header h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .header .stats { font-size: 12px; color: #6b7280; }

    /* Toast */
    .toast {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #111827;
      color: white;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .toast.show { transform: translateY(0); }
    .toast.removed { background: #7c2d12; }
    .toast .toast-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.85;
      margin-bottom: 2px;
    }

    /* Actions */
    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
    }
    .actions button {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #374151;
    }
    .actions button:hover { background: #f9fafb; border-color: #9ca3af; }
    .actions button.primary { background: #111827; color: white; border-color: #111827; }
    .actions button.primary:hover { background: #1f2937; }

    /* Search */
    .search-bar {
      padding: 8px 16px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.92);
    }
    .search-controls {
      display: flex;
      gap: 8px;
    }
    .search-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .search-bar input:focus { border-color: #111827; }
    .search-bar select {
      width: 92px;
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      color: #374151;
      outline: none;
    }
    .search-bar select:focus { border-color: #111827; }

    /* Bookmark list */
    .bookmark-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .bookmark-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
      border-left: 2px solid transparent;
      position: relative;
      background: rgba(255,255,255,0.88);
    }
    .bookmark-item:hover { background: #ffffff; }
    .bookmark-item.platform-farcaster { border-left-color: #7c3aed; }
    .bookmark-item.platform-twitter { border-left-color: #111827; }
    .bookmark-item.fresh { animation: freshPulse 2s ease-out; }
    @keyframes freshPulse {
      0% { background: #d1fae5; }
      100% { background: transparent; }
    }
    .bookmark-content { cursor: pointer; }
    .bookmark-author {
      font-size: 12px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }
    .bookmark-author .fid { font-weight: 400; color: #9ca3af; margin-left: 4px; }
    .bookmark-text {
      font-size: 13px;
      color: #374151;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bookmark-quote {
      margin-top: 8px;
      padding: 8px 10px;
      border-left: 3px solid #d1d5db;
      background: #f9fafb;
      border-radius: 0 6px 6px 0;
    }
    .bookmark-quote-author {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .bookmark-quote-text {
      font-size: 12px;
      color: #4b5563;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bookmark-footer {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .capture-badge {
      background: #f3f4f6;
      color: #4b5563;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .capture-badge.platform-farcaster {
      background: #ede9fe;
      color: #6d28d9;
    }
    .capture-badge.platform-twitter {
      background: #e5e7eb;
      color: #111827;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
    }
    .empty-state p { margin-bottom: 8px; }
    .empty-state .hint { font-size: 12px; color: #d1d5db; }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="toast-label">Bookmark captured</div>
    <div id="toast-text"></div>
  </div>

  <div class="header">
    <h1>Bookmarks Archive</h1>
    <div class="stats" id="stats">Loading...</div>
  </div>

  <div class="search-bar">
    <div class="search-controls">
      <input type="text" id="search" placeholder="Search bookmarks...">
      <select id="sortMode">
        <option value="saved">Saved</option>
        <option value="published">Posted</option>
      </select>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="syncBtn">Sync All</button>
    <button id="exportBtn">JSON</button>
    <button id="obsidianBtn">Obsidian</button>
  </div>

  <div class="bookmark-list" id="bookmarkList"></div>

  <script src="utils.js"></script>
  <script src="farcaster.js"></script>
  <script src="twitter.js"></script>
  <script src="obsidian-export.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
