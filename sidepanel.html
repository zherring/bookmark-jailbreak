<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --accent-hover: #6d28d9;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #111827;
      background: #f3f4f6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(243,244,246,0.92)),
        radial-gradient(circle at top left, rgba(209,213,219,0.35), transparent 48%);
      color: #111827;
      flex-shrink: 0;
      border-bottom: 1px solid #e5e7eb;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .pill {
      display: inline-flex;
      align-items: center;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
      min-width: 24px;
      justify-content: center;
    }
    .header .title {
      font-size: 16px;
      font-weight: 700;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #111827;
      color: white;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .toast.show { transform: translateY(0); }
    .toast.removed { background: #7c2d12; }
    .toast.navigate { background: var(--accent); }
    .toast .toast-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.85;
      margin-bottom: 2px;
    }
    .toast a {
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }

    /* Actions */
    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
    }
    .actions button.primary {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .actions button.primary:hover { filter: brightness(0.9); }
    .actions button.primary:disabled { background: #d1d5db; cursor: not-allowed; }
    .actions .sep { flex: 1; }
    .actions .action-link {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      background: none;
      border: none;
      padding: 0;
    }
    .actions .action-link:hover { text-decoration: underline; }
    .actions .action-label {
      font-size: 11px;
      color: #9ca3af;
    }

    /* Search */
    .search-bar {
      padding: 8px 16px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.92);
    }
    .search-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar .primary {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-bar .primary:hover { filter: brightness(0.9); }
    .search-bar .primary:disabled { background: #d1d5db; cursor: not-allowed; }
    .sort-toggle {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
      background: none;
      border: none;
      padding: 0;
    }
    .sort-toggle:hover { text-decoration: underline; }

    /* Bookmark list */
    .bookmark-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .bookmark-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
      border-left: 2px solid transparent;
      position: relative;
      background: rgba(255,255,255,0.88);
    }
    .bookmark-item:hover { background: #ffffff; }
    .bookmark-item.platform-farcaster { border-left-color: #7c3aed; }
    .bookmark-item.platform-twitter { border-left-color: #111827; }
    .bookmark-item.fresh { animation: freshPulse 2s ease-out; }
    @keyframes freshPulse {
      0% { background: #d1fae5; }
      100% { background: transparent; }
    }
    .bookmark-content { cursor: pointer; }
    .bookmark-author {
      font-size: 12px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }
    .bookmark-author .fid { font-weight: 400; color: #9ca3af; margin-left: 4px; }
    .bookmark-text {
      font-size: 13px;
      color: #374151;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bookmark-quote {
      margin-top: 8px;
      padding: 8px 10px;
      border-left: 3px solid #d1d5db;
      background: #f9fafb;
      border-radius: 0 6px 6px 0;
    }
    .bookmark-quote-author {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .bookmark-quote-text {
      font-size: 12px;
      color: #4b5563;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bookmark-footer {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .capture-badge {
      background: #f3f4f6;
      color: #4b5563;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .capture-badge.platform-farcaster {
      background: #ede9fe;
      color: #6d28d9;
    }
    .capture-badge.platform-twitter {
      background: #e5e7eb;
      color: #111827;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
    }
    .empty-state p { margin-bottom: 8px; }
    .empty-state .hint { font-size: 12px; color: #d1d5db; }

    /* View toggle */
    .view-toggle {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }
    .view-toggle button {
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 500;
      color: #9ca3af;
      cursor: pointer;
    }
    .view-toggle button:hover { color: #374151; border-color: #d1d5db; }
    .view-toggle button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Feed view */
    .feed-view {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .feed-section {
      margin-bottom: 20px;
    }
    .feed-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .feed-card {
      background: white;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid #e5e7eb;
    }
    .feed-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .feed-row + .feed-row { border-top: 1px solid #f3f4f6; }
    .feed-row[data-author]:hover { background: #f9fafb; border-radius: 4px; }
    .feed-row-label {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
      width: 120px;
      min-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .feed-row-value {
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
      width: 32px;
      min-width: 32px;
      text-align: right;
    }
    .feed-bar-wrap {
      flex: 1;
      margin: 0 10px;
      height: 6px;
      background: #f3f4f6;
      border-radius: 3px;
      overflow: hidden;
    }
    .feed-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .feed-bar.twitter { background: #111827; }
    .feed-bar.farcaster { background: #7c3aed; }
    .feed-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .feed-stat-box {
      background: white;
      border-radius: 8px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      text-align: center;
    }
    .feed-stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
    }
    .feed-stat-label {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .feed-topic-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      margin: 0 4px 4px 0;
      background: var(--accent-light);
      color: var(--accent);
      transition: filter 0.15s;
    }
    .feed-topic-pill:hover { filter: brightness(0.92); }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="toast-label" id="toast-label">Bookmark captured</div>
    <div id="toast-text"></div>
  </div>

  <div class="header">
    <span class="pill" id="pill">0</span>
    <span class="title">Bookmarks archived</span>
    <div class="view-toggle">
      <button id="viewList" class="active">List</button>
      <button id="viewFeed">Report</button>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-controls">
      <input type="text" id="search" placeholder="Search bookmarks...">
      <button class="primary" id="syncBtn">Sync All</button>
    </div>
  </div>

  <div class="actions">
    <span class="action-label">Sort:</span>
    <button class="action-link" id="sortToggle">Saved</button>
    <span class="sep"></span>
    <span class="action-label">Show:</span>
    <button class="action-link" id="platformToggle">All</button>
    <span class="sep"></span>
    <span class="action-label">Download:</span>
    <button class="action-link" id="exportBtn">JSON</button>
    <button class="action-link" id="mdBtn">Markdown</button>
  </div>

  <div class="bookmark-list" id="bookmarkList"></div>
  <div class="feed-view" id="feedView" hidden></div>

  <script src="utils.js"></script>
  <script src="farcaster.js"></script>
  <script src="twitter.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
